<!DOCTYPE html>
<html lang="en">
  <head>
    <!--
      MR Sim Track Editor
      Main application layout and script boot order.
    -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MR Sim Track Editor</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"
      
    ></script>
    <!-- Script load order matters here bc of global variables -->
    <script src="objects.js" defer></script>
    <script src="utils.js" defer></script>
    <script src="model.js" defer></script>
    <script src="import.js" defer></script>
    <script src="config/indicator-config.js" defer></script>
    <script src="ui/gate-order.js" defer></script>
    <script src="ui/sidebar.js" defer></script>
    <script src="ui/canvas-view.js" defer></script>
    <script src="ui/selection-panel.js" defer></script>
    <script src="editor.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <h1 class="app-title">
        <img src="assets/MRSIM_Logo.png" alt="MRSIM logo" />
        <span>Track Editor (Prototype)</span>
      </h1>
      <div class="header-actions">
        <button id="import-button" type="button">Import XML</button>
        <button id="export-button" class="primary">Export XML</button>
        <input id="import-file-input" type="file" accept=".xml" hidden />
      </div>
    </header>
    <main class="app-layout">
      <section class="sidebar sidebar-left" data-sidebar="left">
        <div class="panel panel-selected">
          <h2>Object Palette</h2>
          <div class="palette-tabs" role="tablist" aria-label="Palette tabs">
            <button id="palette-tab-favorites" class="palette-tab active" type="button" aria-pressed="true">
              Favorites
            </button>
            <button id="palette-tab-standard" class="palette-tab" type="button" aria-pressed="false">
              Standard
            </button>
            <button id="palette-tab-champs" class="palette-tab" type="button" aria-pressed="false">
              Champ Size
            </button>
          </div>
          <div id="object-palette" class="palette"></div>
        </div>
        <button id="toggle-palette-sidebar" type="button" class="palette-edge-tab" aria-pressed="false" aria-label="Collapse object palette">
          <
        </button>
      </section>
      <section class="canvas-area">
        <div class="canvas-view-tabs" role="tablist" aria-label="Canvas view">
          <button
            id="canvas-tab-editor"
            class="canvas-view-tab active"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="editor-canvas-panel"
          >
            Editor
          </button>
          <button
            id="canvas-tab-gate-order"
            class="canvas-view-tab"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="gate-order-panel"
          >
            Gate Order
          </button>
        </div>
        <div class="canvas-toolbar">
          <div class="toolbar-actions">
            <button id="toggle-references" type="button">Hide Reference Layout</button>
            <button id="reset-view" type="button">Reset View</button>
            <button id="clear-scene" type="button" class="danger">
              Clear Scene
            </button>
            <button id="toggle-snapping" type="button" class="secondary" aria-pressed="true">
              Snapping On
            </button>
            <button id="measure-toggle" type="button" class="secondary" aria-pressed="false">
              Ruler Off
            </button>
          </div>
          <div class="zoom-controls" role="group" aria-label="Canvas zoom controls">
            <button id="zoom-out" type="button" aria-label="Zoom out">-</button>
            <input
              id="zoom-slider"
              type="range"
              min="40"
              max="250"
              step="1"
              value="50"
              aria-label="Zoom level"
            />
            <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
            <span id="zoom-value" aria-live="polite">50%</span>
          </div>
          <button id="toggle-sidebars" type="button" class="secondary" aria-pressed="false">
            Hide Sidebars
          </button>
        </div>
        <div id="editor-canvas-panel" class="canvas-panel" role="tabpanel" aria-labelledby="canvas-tab-editor">
          <div class="canvas-wrapper">
            <canvas id="track-canvas" width="750" height="800"></canvas>
          </div>
        </div>
        <div id="gate-order-panel" class="canvas-panel hidden" role="tabpanel" aria-labelledby="canvas-tab-gate-order" aria-hidden="true">
          <div class="gate-order-toolbar">
            <input id="gate-order-input" type="text" placeholder="trkCube1.topEntry" />
            <button id="gate-order-add" type="button">Add Checkpoint</button>
          </div>
          <ol id="gate-order-list" class="gate-order-list"></ol>
          <p id="gate-order-empty" class="selected-empty">No checkpoints added.</p>
        </div>
      </section>
      <section class="sidebar sidebar-right" data-sidebar="right">
        <div class="panel">
          <div class="palette-tabs" role="tablist" aria-label="Right sidebar tabs">
            <button id="right-tab-misc" class="palette-tab" type="button" aria-pressed="false">
              Misc
            </button>
          </div>
        </div>
        <div id="right-panel-misc" class="panel hidden">
          <div class="palette-tabs" role="tablist" aria-label="Misc tabs">
            <button id="misc-tab-snapping" class="palette-tab active" type="button" aria-pressed="true">
              Snapping
            </button>
            <button id="misc-tab-transform" class="palette-tab" type="button" aria-pressed="false">
              Global Transform
            </button>
          </div>
        </div>
        <div id="right-panel-snapping" class="panel hidden">
          <h2>Snapping</h2>
          <label class="field">
            <span>Grid size (m)</span>
            <input
              id="grid-size-input"
              type="number"
              min="0.1"
              step="0.1"
              value="0.7"
            />
          </label>
          <label class="field">
            <span>Rotation snap (°)</span>
            <input
              id="rotation-snap-input"
              type="number"
              min="1"
              step="1"
              value="5"
            />
          </label>
        </div>
        <div id="right-panel-transform" class="panel hidden">
          <h2>Global Transform</h2>
          <label class="field">
            <span>Offset X (m)</span>
            <input id="global-offset-x" type="number" step="0.1" value="0" />
          </label>
          <label class="field">
            <span>Offset Y (m)</span>
            <input id="global-offset-y" type="number" step="0.1" value="0" />
          </label>
          <label class="field">
            <span>Rotation (°)</span>
            <input id="global-rotation" type="number" step="1" value="0" />
          </label>
        </div>
        <div class="panel selected-panel">
          <h2>Selected Object</h2>
          <div class="selected-panel__body">
            <div id="selected-none" class="selected-empty">
              No object selected.
            </div>
            <div id="selected-details" class="selected-details hidden">
              <div class="selected-tabs" role="tablist" aria-label="Selected object views">
                <button id="selected-tab-properties" class="selected-tab active" type="button" aria-selected="true">
                  Properties
                </button>
                <button id="selected-tab-indicator" class="selected-tab hidden" type="button" aria-selected="false">
                  Gate Indicator
                </button>
              </div>
              <div id="selected-properties-panel" class="selected-tab-panel">
                <div class="field readonly">
                  <span>Label</span>
                  <span id="selected-label"></span>
                </div>
                <div id="selected-preview-wrapper" class="selected-preview hidden">
                  <img id="selected-preview" alt="Selected object preview" />
                </div>
                <div class="field readonly">
                  <span>Entity name</span>
                  <span id="selected-entity"></span>
                </div>
                <div class="field readonly">
                  <span>Position X (m)</span>
                  <span id="selected-position-x">0.000</span>
                </div>
                <div class="field readonly">
                  <span>Position Y (m)</span>
                  <span id="selected-position-y">0.000</span>
                </div>
                <div class="field readonly">
                  <span>Rotation (°)</span>
                  <span id="selected-rotation">0</span>
                </div>
                <label class="field">
                  <span>Altitude (m)</span>
                  <input id="selected-altitude" type="number" step="0.1" value="0" />
                </label>
                <div id="gate-stack-controls" class="attachment-controls hidden">
                  <label class="field">
                    <span>5x5 Gate Stack</span>
                    <select id="gate-stack-count">
                      <option value="1">1 gate</option>
                      <option value="2">2 gates</option>
                      <option value="3">3 gates</option>
                    </select>
                  </label>
                </div>
                <div class="field readonly">
                  <span>Include file</span>
                  <span id="selected-include"></span>
                </div>
                <div id="attachment-controls" class="attachment-controls hidden">
                  <label class="field">
                    <span>Attach Mode</span>
                    <select id="attach-mode-select">
                      <option value="">None (Standalone)</option>
                      <option value="gate">Gate</option>
                      <option value="cube">Cube</option>
                    </select>
                  </label>
                  <div id="gate-attachment-fields">
                    <label class="field">
                      <span>Attach to Gate</span>
                      <select id="attach-gate-select">
                        <option value="">None (Standalone)</option>
                      </select>
                    </label>
                    <label class="field">
                      <span>Attachment Side</span>
                      <select id="attach-side-select">
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                      </select>
                    </label>
                    <label class="field">
                      <span>Attach Gate Level</span>
                      <select id="attach-level-select">
                        <option value="1">Gate 1</option>
                      </select>
                    </label>
                  </div>
                  <div id="cube-attachment-fields">
                    <label class="field">
                      <span>Attach to Cube</span>
                      <select id="attach-cube-select">
                        <option value="">None (Standalone)</option>
                      </select>
                    </label>
                    <label class="field">
                      <span>Cube Corner</span>
                      <select id="attach-corner-select">
                        <option value="1">Corner 1</option>
                        <option value="2">Corner 2</option>
                        <option value="3">Corner 3</option>
                        <option value="4">Corner 4</option>
                      </select>
                    </label>
                  </div>
                </div>
                <div class="selected-actions">
                  <button id="duplicate-button" type="button">Duplicate</button>
                  <button id="delete-button" type="button" class="danger">
                    Delete
                  </button>
                </div>
              </div>
              <div id="selected-indicator-panel" class="selected-tab-panel hidden">
                <div class="field readonly">
                  <span>Face</span>
                  <span id="indicator-selected-face">None</span>
                </div>
                <label id="indicator-mode-field" class="field">
                  <span>Mode</span>
                  <select id="indicator-mode">
                    <option value="Entry">Entry</option>
                    <option value="Exit">Exit</option>
                  </select>
                </label>
                <button id="indicator-add-checkpoint" type="button">Add to Gate Order</button>
                <div id="indicator-svg-container" class="indicator-svg-container"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
